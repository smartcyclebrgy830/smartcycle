<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Up Your Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <main class="login-container">
        <section class="form-side" aria-label="Account setup form">
            <header>
                <h1>Set up your account</h1>
            </header>

            <form id="setupForm" method="post" action="" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        readonly 
                        disabled
                        placeholder="Loading email...">
                </div>

                <div class="form-group">
                    <label for="password">New Password</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Create a secure password" 
                            required 
                            aria-required="true"
                            aria-invalid="false"
                            aria-describedby="passwordError">
                        <button type="button" class="toggle-password" onclick="togglePassword('password', 'toggleIcon1', 'toggleButton1')"
                            aria-label="Show password" aria-pressed="false" id="toggleButton1">
                            <svg id="toggleIcon1" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                    <small id="passwordError" role="alert">Password must be at least 6 characters long</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            placeholder="Re-enter your password" 
                            required 
                            aria-required="true"
                            aria-invalid="false"
                            aria-describedby="confirmPasswordError">
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', 'toggleIcon2', 'toggleButton2')"
                            aria-label="Show password" aria-pressed="false" id="toggleButton2">
                            <svg id="toggleIcon2" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                    <small id="confirmPasswordError" role="alert">Passwords do not match</small>
                </div>

                <button type="submit" class="login-button" id="submitBtn">Create Password and Log In</button>
            </form>

            <footer class="logo">
                <img src="photo/logo_name.png" alt="Smartcycle Logo" class="logo-image">
            </footer>
        </section>

        <aside class="glass-side" aria-hidden="true"></aside>
    </main>

    <dialog id="successModal" aria-labelledby="successTitle" aria-describedby="successDesc">
        <div class="modal-icon success" aria-hidden="true">✓</div>
        <h2 id="successTitle" class="modal-title">Account Ready!</h2>
        <p id="successDesc" class="modal-message">Your password has been set up. Logging you in now...</p>
    </dialog>

    <dialog id="errorModal" aria-labelledby="errorTitle" aria-describedby="errorDesc">
        <button class="modal-close" id="modalCloseBtn" aria-label="Close">✕</button>
        <div class="modal-icon error" aria-hidden="true">✕</div>
        <h2 id="errorTitle" class="modal-title">Setup Failed</h2>
        <p id="errorDesc" class="modal-message">The invitation link may be invalid or expired. Please check with your Super Admin.</p>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="setup_account.js"></script>
</body>
</html>
