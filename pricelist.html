<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="pricelist.css">
</head>
<body>

    <div id="navbar-container"></div>

    <main class="main-content">

        <header class="page-header">
            <h1 class="greeting">Price List</h1>
            <button class="btn-add" type="button" id="addItemBtn">
                <i data-lucide="plus" aria-hidden="true"></i>
                <span class="btn-text">Add Item</span>
            </button>
        </header>

        <section aria-labelledby="pricelist-title">
            <h2 id="pricelist-title" class="visually-hidden">Material Prices Table</h2>
            <div class="card">
                <div class="table-controls">
                    <span class="item-count" id="itemCount">0 materials</span>
                    <div class="search-input" role="search">
                        <i data-lucide="search" width="18" height="18" aria-hidden="true"></i>
                        <input type="text" id="priceSearch" placeholder="Search Material" aria-label="Search price list">
                    </div>
                </div>
                <div class="table-wrapper">
                    <table class="price-table">
                        <thead>
                            <tr>
                                <th scope="col">Material</th>
                                <th scope="col">Unit</th>
                                <th scope="col">Price (₱)</th>
                                <th scope="col">Status</th>
                                <th class="action-column" scope="col">Action</th>
                            </tr>
                        </thead>
                        <tbody id="priceTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>

                    <div class="empty-state" id="emptyState">
                        <i data-lucide="tag" aria-hidden="true"></i>
                        <p>No items yet. Add a material to get started.</p>
                    </div>
                </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Add / Edit Modal -->
    <div id="itemModalOverlay" class="pl-modal-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle" style="display:none">
        <div class="pl-modal-box">
            <h2 id="modalTitle" class="pl-modal-title">Add New Material</h2>

            <div class="pl-form-group">
                <label for="materialName">Material Name</label>
                <input type="text" id="materialName" placeholder="e.g. PET Bottles" autocomplete="off">
            </div>

            <div class="pl-form-group">
                <label for="unit">Unit</label>
                <select id="unit">
                    <option value="per kg">per kg</option>
                    <option value="per pc">per pc</option>
                </select>
            </div>

            <div class="pl-form-group">
                <label for="itemPrice">Price (₱)</label>
                <input type="number" id="itemPrice" placeholder="e.g. 12" min="0" step="0.01">
            </div>

            <div class="pl-modal-actions">
                <button class="btn-cancel" type="button" id="cancelBtn">
                    <i data-lucide="x" style="width:15px;height:15px;"></i>
                    Cancel
                </button>
                <button class="btn-save" type="button" id="saveBtn">
                    <i data-lucide="check" style="width:15px;height:15px;"></i>
                    Add Item
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="navbar.js"></script>
    <script src="pricelist.js"></script>
</body>
</html>
