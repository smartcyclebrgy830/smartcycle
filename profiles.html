<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profiles</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="profiles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav id="navbar-container"></nav>

    <main class="main-content">
        <header class="page-header">
            <h1>Profiles</h1>
        </header>

        <div class="contacts-content-box">
            <section class="contacts-toolbar">
                <nav class="tab-navigation" role="tablist">
                    <button class="tab-btn active" data-tab="all" role="tab" aria-selected="true" id="all-tab">All</button>
                    <button class="tab-btn" data-tab="collections" role="tab" aria-selected="false" id="collections-tab">Collections</button>
                    <button class="tab-btn" data-tab="sales" role="tab" aria-selected="false" id="sales-tab">Sales</button>
                </nav>

                <div class="search-container">
                    <div class="search-input">
                        <i data-lucide="search" class="search-icon"></i>
                        <input type="text" id="searchInput" placeholder="Search Customer Name/ID" aria-label="Search contacts">
                    </div>
                </div>
            </section>

            <section class="table-container">
                <div class="table-wrapper">
                    <table class="contacts-table">
                        <thead>
                            <tr>
                                <th style="width: 250px; min-width: 250px;">CUSTOMER</th>
                                <th style="width: 100px; min-width: 130px;">ID</th>
                                <th style="width: 130px; min-width: 150px;">CATEGORY</th>
                                <th style="width: 250px; min-width: 250px;">ADDRESS</th>
                                <th style="width: 140px; min-width: 160px;">CONTACT NUM</th>
                                <th id="actionHeader" style="width: 100px; min-width: 100px; text-align: center;">ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="contactsTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
                <nav class="pagination" aria-label="Pagination"></nav>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="logger.js"></script>
    <script src="navbar.js"></script>
    <script src="profiles.js"></script>
</body>
</html>
