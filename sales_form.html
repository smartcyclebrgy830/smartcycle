<link rel="stylesheet" href="sales_form.css">
<script src="sales.js"></script>
<script src="sales_form.js"></script>

<div id="saleModal" class="modal-overlay" role="dialog" aria-labelledby="saleModalTitle" aria-modal="true">
  <div class="modal-container-form">

    <section class="modal-left">
      <div class="modal-logo-section">
        <img src="photo/logo_name.png" alt="SmartCycle" width="120" onerror="this.style.display='none'">
      </div>
      
      <nav class="modal-tabs-small" role="tablist" aria-label="Sale type">
        <button class="m-tab active" role="tab" aria-selected="true" data-type="organization" type="button">Organization</button>
        <button class="m-tab" role="tab" aria-selected="false" data-type="junkshop" type="button">Junk-Shop</button>
      </nav>

      <!-- Partner / Contact /Date -->
      <div class="form-grid-modal">
        <div class="form-group" style="grid-column: 1 / -1; position: relative;">
          <label for="partnerName">Partner Name</label>
          <input type="text" id="partnerName" placeholder="Enter partner name" autocomplete="off">
          <div id="partnerSuggestions" class="suggestions-dropdown" style="display: none;"></div>
          <span class="field-error" id="partnerNameError"></span>
        </div>
        <div class="form-group" style="grid-column: 1 / -1;">
            <label for="saleAddress">Address</label>
            <input type="text" id="saleAddress" placeholder="Enter address">
            <span class="field-error" id="saleAddressError"></span>
        </div>
        <div class="form-group">
          <label for="saleContact">Contact Number</label>
          <input type="tel" id="saleContact" placeholder="09XX-XXX-XXXX">
          <span class="field-error" id="saleContactError"></span>
        </div>
        <div class="form-group">
          <label for="saleDate">Date</label>
          <input type="date" id="saleDate">
          <span class="field-error" id="saleDateError"></span>
        </div>
      </div>

      <!-- Material Inpt -->
      <div class="material-input-section">
        <label>Material & Rate</label>
        <div class="material-row-input" style="display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px;">
          <input type="text" id="materialNameInput" placeholder="Material Name" maxlength="30">
          <input
<input
    type="text"
    id="materialRateInput"
    inputmode="decimal"
    min="0"
    max="99999"
    step="0.01"
    placeholder="Rate (₱)">

<input
    type="text"
    id="materialWeightInput"
    inputmode="decimal"
  min="0"
    max="99999"
    step="0.01"
    placeholder="Weight (kg)">
          <button class="btn-add-item" type="button" id="addMaterialBtn">
            <i data-lucide="plus"></i> Add
          </button>
        </div>
        <span class="items-error" id="materialsError"></span>
      </div>

      <!-- Materials table -->
      <div class="items-table-container">
        <table class="items-table">
          <thead>
            <tr>
              <th scope="col">Material</th>
              <th scope="col">Weight</th>
              <th scope="col">Subtotal</th>
              <th scope="col"></th>
            </tr>
          </thead>
          <tbody id="materialsBody">
            <tr>
              <td colspan="5" style="text-align:center; color:#94a3b8; padding:20px;">No materials added yet</td>
            </tr>
          </tbody>
        </table>
        <div class="form-total-line" id="saleFormTotalLine" style="display:none;">
          <span>Total Amount:</span>
          <strong id="saleFormTotal">0.00</strong>
        </div>
      </div>

      <!-- Receipt Attach -->
      <div class="sale-receipt-section">
        <label class="receipt-label">
          <i data-lucide="paperclip"></i>
          Attach Receipt <span style="color:#94a3b8; font-weight:400;"></span>
        </label>
        <div class="receipt-dropzone" id="attachReceiptBtn">
          <i data-lucide="cloud-upload"></i>
          <p>Click to upload or drag & drop</p>
          <span>JPG & PNG supported</span>
        </div>
        <div class="receipt-file-confirm" id="receiptPreview">
          <i data-lucide="file-check"></i>
          <span class="receipt-file-name" id="receiptFilenameLabel"></span>
          <button class="remove-receipt-confirm" id="removeReceiptBtn" type="button">
            <i data-lucide="x"></i>
          </button>
        </div>
        <input type="file" id="receiptInput" accept="image/*,.pdf" hidden>
        <span class="field-error" id="receiptError"></span>
      </div>

      <!-- Footer Actions -->
      <div class="modal-footer-actions">
        <button class="btn-cancel" type="button" id="cancelSaleBtn">
          <i data-lucide="x"></i>
          Cancel
        </button>
        <button class="btn-submit-green" type="button" id="submitSaleBtn">
          <i data-lucide="check"></i>
          Submit
        </button>
      </div>
    </section>

  </div>
</div>
